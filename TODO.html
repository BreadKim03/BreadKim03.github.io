<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Calendar</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <style>
        :root {
            --border-color: #222;
            --bg-color: #fff;
            --font-main: 'Nanum Pen Script', cursive;
        }

        body {
            font-family: var(--font-main);
            background-color: #f9f9f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            color: var(--border-color);
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .container {
            width: 95%;
            max-width: 1200px;
            min-height: 600px;
            background-color: var(--bg-color);
            border: 4px solid var(--border-color);
            border-radius: 10px;
            position: relative;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        /* 상단 네비게이션 */
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .month-nav {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 2.5rem;
        }

        .nav-arrow {
            cursor: pointer;
            font-size: 2rem;
            background: none;
            border: none;
            font-family: var(--font-main);
            font-weight: bold;
            transition: transform 0.2s;
        }

        .nav-arrow:hover { transform: scale(1.2); }

        /* 요일 및 캘린더 그리드 */
        .calendar-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .weekdays div:first-child { color: red; } /* 일요일 */
        .weekdays div:last-child { color: blue; } /* 토요일 */

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            flex-grow: 1;
        }

        .day-box {
            border: 3px solid var(--border-color);
            border-radius: 8px;
            min-height: 100px;
            position: relative;
            background-color: #fff;
            padding: 30px 5px 35px 5px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            overflow-y: auto;
        }

        .day-box::-webkit-scrollbar { display: none; }
        .day-box { -ms-overflow-style: none; scrollbar-width: none; }

        .day-box.empty {
            border: none;
            background: transparent;
        }

        .day-number {
            position: absolute;
            top: 5px;
            right: 10px;
            font-size: 1.5rem;
            font-weight: bold;
        }

        /* 캘린더 내부 To-Do 아이템 */
        .todo-badge {
            font-size: 1.2rem;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 4px 6px;
            word-break: break-all;
            line-height: 1.2;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        /* 클릭 유도를 위한 마우스 오버 효과 */
        .todo-badge:hover { background-color: #ddd; }

        .add-btn {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 25px;
            height: 25px;
            background-color: #fff;
            border: 2px solid var(--border-color);
            border-radius: 4px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            transition: background-color 0.2s;
        }

        .add-btn:hover { background-color: #eee; }

        /* 공통 버튼 */
        .bottom-right {
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .action-btn {
            font-family: var(--font-main);
            font-size: 1.5rem;
            padding: 5px 20px;
            background-color: #fff;
            border: 3px solid var(--border-color);
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.8);
            transition: all 0.1s;
        }

        .action-btn:active {
            box-shadow: 0px 0px 0px;
            transform: translate(2px, 2px);
        }

        /* 리스트 뷰 */
        #list-view {
            display: none;
            flex-direction: column;
            flex-grow: 1;
        }

        .list-header {
            font-size: 2.5rem;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        #todo-list-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-grow: 1;
            overflow-y: auto;
            max-height: 400px;
        }

        .list-item {
            font-size: 1.8rem;
            padding: 10px;
            border: 2px dashed #ccc;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        /* 클릭 유도를 위한 마우스 오버 효과 */
        .list-item:hover { background-color: #f0f0f0; }

        .list-date-badge {
            background-color: var(--border-color);
            color: #fff;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-family: sans-serif;
            white-space: nowrap;
        }

        .empty-message {
            font-size: 2rem;
            text-align: center;
            color: #777;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <h1>To-Do List</h1>

    <div class="container">
        <div id="calendar-view" class="calendar-wrapper">
            <div class="header-area">
                <div style="width: 100px;"></div> 
                <div class="month-nav">
                    <button class="nav-arrow" onclick="changeMonth(-1)">◁</button>
                    <span id="current-month-display"></span>
                    <button class="nav-arrow" onclick="changeMonth(1)">▷</button>
                </div>
                <div style="width: 100px;"></div>
            </div>

            <div class="weekdays">
                <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
            </div>

            <div class="days-grid" id="calendar-grid">
            </div>

            <div class="bottom-right">
                <button class="action-btn" onclick="toggleView()">전체 목록 ▷</button>
            </div>
        </div>

        <div id="list-view">
            <div class="list-header">전체 To-Do 목록 (빠른 날짜순)</div>
            
            <div id="todo-list-container">
            </div>

            <div class="bottom-right">
                <button class="action-btn" onclick="toggleView()">◁ 캘린더로 돌아가기</button>
            </div>
        </div>
    </div>

    <script>
        // 전역 상태 변수
        let currentDate = new Date(); 
        let todos = []; 

        const monthDisplay = document.getElementById('current-month-display');
        const calendarGrid = document.getElementById('calendar-grid');
        const listContainer = document.getElementById('todo-list-container');
        const calendarView = document.getElementById('calendar-view');
        const listView = document.getElementById('list-view');

        renderCalendar();

        // 캘린더 렌더링
        function renderCalendar() {
            calendarGrid.innerHTML = '';
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth(); 
            
            monthDisplay.innerText = `${year}년 ${month + 1}월`;

            const firstDayIndex = new Date(year, month, 1).getDay();
            const lastDay = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDayIndex; i++) {
                const emptyBox = document.createElement('div');
                emptyBox.className = 'day-box empty';
                calendarGrid.appendChild(emptyBox);
            }

            for (let day = 1; day <= lastDay; day++) {
                const dayBox = document.createElement('div');
                dayBox.className = 'day-box';
                
                const dayNum = document.createElement('span');
                dayNum.className = 'day-number';
                dayNum.innerText = day;
                dayBox.appendChild(dayNum);

                const dayTodos = todos.filter(t => t.year === year && t.month === month && t.date === day);
                dayTodos.forEach(todo => {
                    const badge = document.createElement('div');
                    badge.className = 'todo-badge';
                    badge.innerText = todo.text;
                    // 클릭 시 수정/삭제 기능 연결
                    badge.onclick = () => handleTodoAction(todo.id);
                    dayBox.appendChild(badge);
                });

                const addBtn = document.createElement('button');
                addBtn.className = 'add-btn';
                addBtn.innerText = '+';
                addBtn.onclick = () => addTodo(year, month, day);
                dayBox.appendChild(addBtn);

                calendarGrid.appendChild(dayBox);
            }
        }

        function changeMonth(offset) {
            currentDate.setMonth(currentDate.getMonth() + offset);
            renderCalendar();
        }

        // To-Do 추가
        function addTodo(year, month, day) {
            const task = prompt(`${month + 1}월 ${day}일에 추가할 할 일을 입력하세요:`);
            if (task && task.trim() !== '') {
                todos.push({
                    id: Date.now(),
                    year: year,
                    month: month,
                    date: day,
                    text: task.trim(),
                    timestamp: new Date(year, month, day).getTime() 
                });
                refreshViews(); 
            }
        }

        // To-Do 수정 및 삭제 핸들러
        function handleTodoAction(id) {
            const todoIndex = todos.findIndex(t => t.id === id);
            if (todoIndex === -1) return;

            const todo = todos[todoIndex];
            // 1 입력 시 수정, 2 입력 시 삭제
            const action = prompt(`[ ${todo.text} ]\n\n수정하시려면 '1', 삭제하시려면 '2'를 입력하세요.\n(취소하려면 창을 닫아주세요)`, '1');

            if (action === '1') {
                const newText = prompt('새로운 내용을 입력하세요:', todo.text);
                if (newText && newText.trim() !== '') {
                    todos[todoIndex].text = newText.trim();
                    refreshViews();
                }
            } else if (action === '2') {
                if (confirm('정말로 이 할 일을 삭제하시겠습니까?')) {
                    todos.splice(todoIndex, 1);
                    refreshViews();
                }
            }
        }

        // 화면 갱신 (현재 보고 있는 뷰에 맞춰서 업데이트)
        function refreshViews() {
            renderCalendar(); 
            // 리스트 뷰가 열려있을 때만 리스트도 다시 그림
            if (listView.style.display === 'flex') {
                renderListView();
            }
        }

        // 뷰 전환
        function toggleView() {
            if (calendarView.style.display === 'none') {
                listView.style.display = 'none';
                calendarView.style.display = 'flex';
                renderCalendar();
            } else {
                calendarView.style.display = 'none';
                listView.style.display = 'flex';
                renderListView();
            }
        }

        // 전체 목록 렌더링
        function renderListView() {
            listContainer.innerHTML = '';

            if (todos.length === 0) {
                listContainer.innerHTML = '<div class="empty-message">등록된 할 일이 없습니다.</div>';
                return;
            }

            const sortedTodos = [...todos].sort((a, b) => a.timestamp - b.timestamp);

            sortedTodos.forEach(todo => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'list-item';
                // 클릭 시 수정/삭제 기능 연결
                itemDiv.onclick = () => handleTodoAction(todo.id);

                const dateBadge = document.createElement('span');
                dateBadge.className = 'list-date-badge';
                const m = String(todo.month + 1).padStart(2, '0');
                const d = String(todo.date).padStart(2, '0');
                dateBadge.innerText = `${todo.year}. ${m}. ${d}.`;

                const textNode = document.createTextNode(todo.text);

                itemDiv.appendChild(dateBadge);
                itemDiv.appendChild(textNode);
                listContainer.appendChild(itemDiv);
            });
        }
    </script>
</body>
</html>
